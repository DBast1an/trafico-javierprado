name: Pipeline CI - Control de Trafico Inteligente

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout de codigo
      uses: actions/checkout@v3

    - name: Configurar entorno Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias base
      run: |
        python -m pip install --upgrade pip

    - name: Ejecutar pruebas de los modulos viales
      run: |
        python main.py